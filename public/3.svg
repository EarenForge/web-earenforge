<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0B0B0B"/>

  <!-- Orbit / path -->
  <path d="M120 300 Q256 100 392 260" 
        stroke="#3B82F6" 
        stroke-width="10" 
        fill="none" 
        stroke-linecap="round"/>

  <!-- Star (Silmaril) -->
  <g transform="translate(360,140)">
    <polygon points="0,-18 4,-4 18,0 4,4 0,18 -4,4 -18,0 -4,-4" fill="#3B82F6"/>
  </g>

  <!-- EF monogram -->
  <g fill="#FFFFFF">
    <!-- E -->
    <rect x="140" y="150" width="36" height="220" rx="6"/>
    <rect x="140" y="150" width="140" height="36" rx="6"/>
    <rect x="140" y="242" width="110" height="32" rx="6"/>
    <rect x="140" y="334" width="140" height="36" rx="6"/>

    <!-- F -->
    <rect x="260" y="150" width="36" height="220" rx="6"/>
    <rect x="260" y="150" width="120" height="36" rx="6"/>
    <rect x="260" y="242" width="95" height="32" rx="6"/>
  </g>

</svg>